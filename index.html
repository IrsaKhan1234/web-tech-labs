<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irsa Khan - Web Portfolio</title>
    <style>
        /* Modern Animated Gradient Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899, #f43f5e);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glass Container Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { color: white; font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: rgba(255, 255, 255, 0.9); margin-bottom: 2rem; }

        /* Button Links */
        .link-list { list-style: none; padding: 0; margin: 0; }
        
        .link-item { margin-bottom: 1rem; }

        .btn {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            background: white;
            color: #a855f7;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .github-footer {
            margin-top: 2rem;
            display: block;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .github-footer:hover { color: white; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Irsa's Portfolio</h1>
        <p>Student at UET Peshawar | Web Tech Lab</p>

        <ul class="link-list">
            <li><a href="lab02/profile.html" class="btn">Task 1: Personal Profile</a></li>
            <li><a href="lab02/schedule.html" class="btn">Task 2: Course Schedule</a></li>
            <li><a href="lab02/registration.html" class="btn">Task 4: Registration Form</a></li>
        </ul>

        <a href="https://github.com/IrsaKhan1234" class="github-footer" target="_blank">View My GitHub Profile</a>
    </div>

</body>
</html>
