<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - 404</title>
    <style>
        /* Consistent Theme Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899, #f43f5e);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 404 Card */
        .error-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            line-height: 1;
            background: rgba(255, 255, 255, 0.3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 { font-size: 1.5rem; margin-top: 0; opacity: 0.9; }
        p { margin-bottom: 30px; opacity: 0.7; }

        /* Home Button */
        .home-btn {
            text-decoration: none;
            color: #f43f5e;
            background: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .home-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The link you followed might be broken or the page has been moved.</p>
        <a href="index.html" class="home-btn">Take Me Home</a>
    </div>

</body>
</html>
