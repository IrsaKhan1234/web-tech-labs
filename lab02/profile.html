<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Irsa Khan</title>
    <style>
        /* Matching Animated Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899, #f43f5e);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Profile Card Styling */
        .profile-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 350px;
        }

        /* Circular Profile Image */
        .profile-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        h1 { margin: 10px 0; font-size: 1.8rem; }
        p { font-size: 1rem; opacity: 0.9; line-height: 1.5; }

        /* Back Button */
        .back-btn {
            margin-top: 25px;
            display: inline-block;
            text-decoration: none;
            color: #6366f1;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="../assets/images/profile.jpg" alt="Profile Picture">
        
        <h1>IRSA KHAN</h1>
        <p>I am a student at UET Peshawar studying Web Technologies.</p>
        <p><strong>Email:</strong> irsakhan1882006@gmail.com</p>

        <a href="../index.html" class="back-btn">← Back to Portfolio</a>
    </div>

</body>
</html>
