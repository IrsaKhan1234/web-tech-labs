<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
</head>
<body>
<h2>Student Registration Form</h2>
<form>
    <label>Name:</label><br>
    <input type="text" name="studentName" required><br><br>

    <label>Registration Number:</label><br>
    <input type="text" name="regNum" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <label>Select Course:</label><br>
    <select name="course">
        <option value="web">Web Technologies</option>
        <option value="db">Database Systems</option>
        <option value="os">Operating Systems</option>
    </select><br><br>

    <label>Semester:</label><br>
    <input type="radio" name="semester" value="1"> 1st
    <input type="radio" name="semester" value="2"> 2nd
    <input type="radio" name="semester" value="3"> 3rd
    <input type="radio" name="semester" value="4"> 4th<br><br>

    <input type="checkbox" name="terms" required>
    <label>I agree to the terms and conditions</label><br><br>

    <button type="submit">Submit Registration</button>
</form>
</body>
</html>
